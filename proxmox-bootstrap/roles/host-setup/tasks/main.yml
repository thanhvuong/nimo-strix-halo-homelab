---
- name: Install host utility packages
  ansible.builtin.apt:
    name:
      - ansible
      - btop
    state: present
    update_cache: true

- name: Add terminal compatibility profile for Ghostty
  ansible.builtin.copy:
    dest: /etc/profile.d/term-compat.sh
    mode: "0644"
    content: |
      # Map unsupported Ghostty TERM to a widely available terminfo entry.
      case "${TERM:-}" in
        xterm-ghostty) export TERM=xterm-256color ;;
      esac

- name: Warn when network interface management is disabled
  ansible.builtin.debug:
    msg: >
      Network interface management is disabled (network_manage_interfaces=false).
      Enable it in group_vars/all.yml to render /etc/network/interfaces.
  when: not network_manage_interfaces | bool

- name: Render /etc/network/interfaces from template
  ansible.builtin.template:
    src: interfaces.j2
    dest: /etc/network/interfaces
    mode: "0644"
    backup: true
  when: network_manage_interfaces | bool
  register: interfaces_updated

- name: Reload network configuration with ifreload
  ansible.builtin.command: ifreload -a
  when:
    - network_manage_interfaces | bool
    - network_reload_after_apply | bool
    - interfaces_updated.changed

- name: Add Strix Halo kernel boot parameters to GRUB
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
    line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet {{ kernel_params }}"'
    backup: true
  register: grub_updated

- name: Regenerate GRUB config
  ansible.builtin.command: update-grub
  when: grub_updated.changed

- name: Check if reboot is needed (kernel params not yet active)
  ansible.builtin.shell: |
    grep -q 'amdgpu.gttsize=126976' /proc/cmdline
  register: kernel_params_active
  changed_when: false
  failed_when: false

- name: Warn if reboot is required
  ansible.builtin.debug:
    msg: >
      REBOOT REQUIRED: Kernel boot parameters have been updated but are not yet active.
      Run 'reboot' on the Proxmox host, then re-run this playbook to continue setup.
  when: kernel_params_active.rc != 0
